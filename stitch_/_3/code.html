<script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('toggleIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.textContent = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                toggleIcon.textContent = 'visibility';
            }
        }

        // Simple animation on load
        document.addEventListener('DOMContentLoaded', () => {
            const card = document.querySelector('.login-card-shadow');
            card.classList.add('opacity-0', 'translate-y-4');
            setTimeout(() => {
                card.classList.remove('opacity-0', 'translate-y-4');
                card.classList.add('opacity-100', 'translate-y-0', 'transition-all', 'duration-700', 'ease-out');
            }, 100);
        });

        // Form submission feedback
        const form = document.getElementById('loginForm');
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = form.querySelector('button[type="submit"]');
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> 로그인 중...';
            btn.disabled = true;
            btn.classList.add('opacity-70');
            
            // Artificial delay for UX feel
            setTimeout(() => {
                btn.innerHTML = '로그인';
                btn.disabled = false;
                btn.classList.remove('opacity-70');
            }, 1500);
        });
    </script>
